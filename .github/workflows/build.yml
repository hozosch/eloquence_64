name: Build Eloquence Add-on

on:
  push:
  pull_request:
  release:
    types: [published]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up 64-bit Python 3.13
        id: py64
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          architecture: x64

      - name: Set up 32-bit Python 3.13
        id: py32
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          architecture: x86
          update-environment: false

      - name: Install SCons
        run: pip install scons

      - name: Install PyInstaller (32-bit)
        run: ${{ steps.py32.outputs.python-path }} -m pip install pyinstaller

      - name: Install MSYS2 / gettext
        uses: msys2/setup-msys2@v2
        with:
          install: gettext mingw-w64-x86_64-gcc
          update: true

      - name: Add MSYS2 to PATH
        run: echo "C:\msys64\usr\bin" >> $env:GITHUB_PATH
        shell: pwsh

      - name: Build 32-bit host
        run: |
          ${{ steps.py32.outputs.python-path }} -m PyInstaller --onefile --noconsole --name eloquence_host32 host_eloquence32.py
          copy dist\eloquence_host32.exe addon\synthDrivers\eloquence_host32.exe
        shell: cmd

- name: Build upsampler DLLs
  run: |
    REM 64-bit
    set PATH=C:\msys64\mingw64\bin;%PATH%
    gcc -shared -static-libgcc -o upsampler_x64.dll upsampler.c

    REM 32-bit
    set PATH=C:\msys64\mingw32\bin;%PATH%
    gcc -shared -static-libgcc -o upsampler_x86.dll upsampler.c

    copy upsampler_x64.dll addon\synthDrivers\
    copy upsampler_x86.dll addon\synthDrivers\
  shell: cmd

      - name: Fetch proprietary files
        run: python fetch_eci.py

      - name: Build addon
        run: scons && scons pot

      - name: Upload add-on artifact
        uses: actions/upload-artifact@v7
        with:
          name: nvda-addon
          path: "*.nvda-addon"
          archive: false
      
      - name: Upload pot artifact
        uses: actions/upload-artifact@v7
        with:
          name: pot-file
          path: "*.pot"
          archive: false

      - name: Upload to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.nvda-addon
            *.pot
